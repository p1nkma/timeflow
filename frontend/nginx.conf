server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # TMA entry point
    location /tma {
        try_files $uri /tma.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
