services:
  postgres:
    image: postgres:17-alpine
    container_name: timeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: timeflow
      POSTGRES_PASSWORD: timeflow
      POSTGRES_DB: timeflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeflow -d timeflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timeflow-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://timeflow:timeflow@postgres:5432/timeflow
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: timeflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
