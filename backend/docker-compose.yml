services:
  postgres:
    image: postgres:17-alpine
    container_name: timeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: timeflow
      POSTGRES_PASSWORD: timeflow
      POSTGRES_DB: timeflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeflow -d timeflow"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
